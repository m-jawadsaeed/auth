version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: authshield-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authshield

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: authshield-api

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    env_file:
      - .env

volumes:
  postgres_data:
